services:
  # ==================== Servidor de Descubrimiento ====================
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - el-muro-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/eureka/apps", "-s", "-o", "/dev/null", "-w", "%{http_code}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ==================== Base de Datos - Carreras (PostgreSQL) ====================
  carreras-db:
    image: postgres:15-alpine
    container_name: carreras-db
    environment:
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: password
      POSTGRES_DB: carreras_db
    ports:
      - "5434:5432"
    volumes:
      - carreras-db-data:/var/lib/postgresql/data
    networks:
      - el-muro-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usuario -d carreras_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Base de Datos - Materias (PostgreSQL) ====================
  materias-db:
    image: postgres:15-alpine
    container_name: materias-db
    environment:
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: password
      POSTGRES_DB: materias_db
    ports:
      - "5433:5432"
    volumes:
      - materias-db-data:/var/lib/postgresql/data
    networks:
      - el-muro-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usuario -d materias_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Base de Datos (MongoDB) ====================
  # MongoDB Centralizado para los microservicios: auth-service, posts-service y temas-service
  mongo-db:
    image: mongo:latest
    container_name: mongo-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo-db-data:/data/db
    networks:
      - el-muro-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis (Caché central) ====================
  redis-db:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - el-muro-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Carreras Service (FastAPI/Python) ====================
  carreras-service:
    build:
      context: ../services/carreras-service
      dockerfile: Dockerfile
    container_name: carreras-service
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://usuario:password@carreras-db:5432/carreras_db
      - EUREKA_SERVER_URL=http://eureka-server:8761
    depends_on:
      carreras-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - el-muro-network

  # ==================== Materias Service (FastAPI/Python) ====================
  materias-service:
    build:
      context: ../services/materias-service
      dockerfile: Dockerfile
    container_name: materias-service
    ports:
      - "8004:8002"
    environment:
      - DATABASE_URL=postgresql://usuario:password@materias-db:5432/materias_db
      - SERVICE_PORT=8002
      - EUREKA_SERVER_URL=http://eureka-server:8761
    depends_on:
      materias-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - el-muro-network

  # ==================== Temas Service (FastAPI/Python) ====================
  temas-service:
    build:
      context: ../services/temas-service
      dockerfile: Dockerfile
    container_name: temas-service
    ports:
      - "8003:8003"
    environment:
      - MONGO_URI=mongodb://admin:password@mongo-db:27017/
      - MONGO_DATABASE=temas_db
      - SERVICE_PORT=8003
      - EUREKA_SERVER_URL=http://eureka-server:8761
      - SECRET_KEY=tu-secret-key-super-segura-para-desarrollo-12345
    depends_on:
      mongo-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - el-muro-network

# ==================== Volúmenes ====================
volumes:
  carreras-db-data:
    driver: local
  materias-db-data:
    driver: local
  mongo-db-data:
    driver: local
  redis-data:
    driver: local


# ==================== Redes ====================
networks:
  el-muro-network:
    driver: bridge
